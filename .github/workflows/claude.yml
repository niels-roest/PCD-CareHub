name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Circuit breaker: skip issues labeled 'claude-failed' to prevent retry loops
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'issues' && (
          contains(github.event.issue.body, '@claude') ||
          github.event.action == 'labeled'
        )) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      ) && (
        github.event_name != 'issues' ||
        !contains(toJSON(github.event.issue.labels.*.name), 'claude-failed')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          label_trigger: "claude"
          prompt: |
            After making any code changes, always run these verification steps before creating a PR:
            1. Run `node build.js` — must complete without errors
            2. Run `node verify-build.js` — must pass all checks
            If either command fails, fix the issues first. Do not create a PR until both pass.
            "The build probably works" is not verification — run it and check the output.

      - name: Circuit breaker — label failed issues
        if: failure() && github.event.issue.number
        run: |
          gh issue edit "${{ github.event.issue.number }}" --add-label "claude-failed"
          gh issue comment "${{ github.event.issue.number }}" --body "Claude Code failed on this issue. Remove the \`claude-failed\` label to retry."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
